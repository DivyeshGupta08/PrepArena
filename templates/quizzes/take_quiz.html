{% extends 'base.html' %}

{% block title %}
{{ quiz.title }}
{% endblock %}

{% block content %}

<style>

#timer{
    position:fixed;
    top:80px;
    right:20px;
    z-index:9999;
    min-width:170px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}

</style>

<div class="container py-5">

    <div class="mb-4">

        <h2 class="fw-bold">
            {{ quiz.title }}
        </h2>

    </div>

    <span class="badge bg-success fs-5 p-3" id="timer">
        Time Left: {{ quiz.time_limit_minutes }}:00
    </span>

    <form method="POST" id="quizForm">

        {% csrf_token %}

        {% for question in questions %}

        <div class="card shadow-sm mb-4">

            <div class="card-body">

                <h5 class="fw-bold">
                    Q{{ forloop.counter }}.
                    {{ question.question_text }}
                </h5>

                <hr>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="question_{{ question.id }}"
                        value="A">

                    <label class="form-check-label">
                        {{ question.option_a }}
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="question_{{ question.id }}"
                        value="B">

                    <label class="form-check-label">
                        {{ question.option_b }}
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="question_{{ question.id }}"
                        value="C">

                    <label class="form-check-label">
                        {{ question.option_c }}
                    </label>
                </div>

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="question_{{ question.id }}"
                        value="D">

                    <label class="form-check-label">
                        {{ question.option_d }}
                    </label>
                </div>

            </div>

        </div>

        {% endfor %}

        <div class="d-grid">

            <button
                id="submitBtn"
                type="submit"
                class="btn btn-primary btn-lg">

                Submit Quiz

            </button>

        </div>

    </form>

</div>

<script>

let totalSeconds = {{ quiz.time_limit_minutes }} * 60;

const timer = document.getElementById("timer");
const form = document.getElementById("quizForm");
const submitBtn = document.getElementById("submitBtn");

let quizSubmitted = false;

function updateTimer() {

    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;

    seconds = seconds < 10 ? "0" + seconds : seconds;

    timer.innerHTML = "Time Left: " + minutes + ":" + seconds;

    if (totalSeconds <= 60) {

        timer.classList.remove("bg-success", "bg-warning");
        timer.classList.add("bg-danger");

    }

    else if (totalSeconds <= 300) {

        timer.classList.remove("bg-success");
        timer.classList.add("bg-warning");

    }

    if (totalSeconds <= 0) {

        clearInterval(timerInterval);

        quizSubmitted = true;

        submitBtn.disabled = true;

        submitBtn.innerHTML = "Submitting...";

        alert("Time is over! Quiz will be submitted automatically.");

        form.submit();

        return;

    }

    totalSeconds--;

}

updateTimer();

const timerInterval = setInterval(updateTimer, 1000);

window.addEventListener("beforeunload", function (e) {

    if (!quizSubmitted) {

        e.preventDefault();

        e.returnValue = "";

    }

});

history.pushState(null, null, location.href);

window.onpopstate = function () {

    history.go(1);

};

form.addEventListener("submit", function () {

    quizSubmitted = true;

    submitBtn.disabled = true;

    submitBtn.innerHTML = "Submitting...";

});

</script>

{% endblock %}
